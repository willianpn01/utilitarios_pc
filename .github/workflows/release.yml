name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install nuitka ordered-set zstandard

      - name: Run tests
        run: |
          pip install pytest
          python -m pytest tests/ -v --tb=short

      - name: Build with Nuitka
        shell: cmd
        run: >
          python -m nuitka
          --standalone
          --onefile
          --windows-console-mode=disable
          --windows-icon-from-ico=app/icone.ico
          --enable-plugin=pyqt6
          --include-data-dir=app/assets=app/assets
          --include-data-files=app/icone.ico=app/icone.ico
          --include-package=app
          --include-package=app.core
          --include-package=app.ui
          --include-package=app.ui.widgets
          --output-dir=dist
          --output-filename=UtilitariosPC.exe
          --company-name="Projeto Utilitarios"
          --product-name="Utilitarios PC"
          --file-version=1.2.0.0
          --product-version=1.2.0.0
          --file-description="Suite de utilitarios para organizacao de arquivos e produtividade"
          --copyright="Copyright (C) 2026 Projeto Utilitarios"
          --remove-output
          --assume-yes-for-downloads
          app/main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: UtilitariosPC-Windows
          path: dist/UtilitariosPC.exe
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf ccache libgl1 libegl1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install nuitka ordered-set zstandard

      - name: Run tests
        run: |
          pip install pytest
          python -m pytest tests/ -v --tb=short

      - name: Build with Nuitka
        run: >
          python -m nuitka
          --standalone
          --onefile
          --enable-plugin=pyqt6
          --include-data-dir=app/assets=app/assets
          --include-data-files=app/icone.ico=app/icone.ico
          --include-package=app
          --include-package=app.core
          --include-package=app.ui
          --include-package=app.ui.widgets
          --output-dir=dist
          --output-filename=UtilitariosPC
          --remove-output
          --assume-yes-for-downloads
          app/main.py

      - name: Generate .desktop file
        run: |
          cat > dist/utilitarios-pc.desktop << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=Utilitários PC
          Comment=Suite de utilitários para organização de arquivos e produtividade
          Exec=./UtilitariosPC
          Icon=utilities-file-archiver
          Terminal=false
          Categories=Utility;FileTools;
          StartupNotify=true
          EOF
          chmod +x dist/UtilitariosPC

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: UtilitariosPC-Linux
          path: |
            dist/UtilitariosPC
            dist/utilitarios-pc.desktop
          if-no-files-found: error

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: UtilitariosPC-Windows
          path: artifacts/windows

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: UtilitariosPC-Linux
          path: artifacts/linux

      - name: Package Linux release
        run: |
          cd artifacts/linux
          chmod +x UtilitariosPC 2>/dev/null || true
          tar czf ../UtilitariosPC-Linux-${{ github.ref_name }}.tar.gz *

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Utilitários PC ${{ github.ref_name }}"
          body: |
            ## Utilitários PC ${{ github.ref_name }}
            
            Suite de utilitários multi-plataforma para organização de arquivos e produtividade.
            
            ### Downloads
            - **Windows**: `UtilitariosPC.exe` — executável standalone, basta baixar e rodar
            - **Linux**: `UtilitariosPC-Linux-${{ github.ref_name }}.tar.gz` — extrair e executar `./UtilitariosPC`
            
            ### Requisitos
            - Windows 10/11 (64-bit) ou Linux (Ubuntu 20.04+, Fedora 36+)
            - Nenhuma instalação adicional necessária
          files: |
            artifacts/windows/UtilitariosPC.exe
            artifacts/UtilitariosPC-Linux-${{ github.ref_name }}.tar.gz
          draft: false
          prerelease: false
