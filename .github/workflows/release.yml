name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Evita builds duplicados para a mesma tag/ref.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements-dev.txt

      - name: Compute version from tag
        id: ver
        shell: bash
        run: |
          # "v1.2.3" -> "1.2.3"; fallback seguro para workflow_dispatch sem tag.
          TAG="${GITHUB_REF_NAME#v}"
          if [[ ! "$TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            TAG="0.0.0"
          fi
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          echo "version_full=${TAG}.0" >> "$GITHUB_OUTPUT"
          echo "Versão detectada: $TAG"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install nuitka ordered-set zstandard

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

      # Build standalone (pasta) — NÃO use --onefile para reduzir falsos-positivos
      # do Microsoft Defender/SmartScreen. O bootloader self-extracting do onefile
      # é o principal gatilho heurístico de AV. O instalador Inno Setup cuida da
      # distribuição.
      - name: Build with Nuitka (standalone)
        shell: cmd
        run: >
          python -m nuitka
          --standalone
          --windows-console-mode=disable
          --windows-icon-from-ico=app/icone.ico
          --enable-plugin=pyqt6
          --include-data-dir=app/assets=app/assets
          --include-data-files=app/icone.ico=app/icone.ico
          --include-package=app
          --include-package=app.core
          --include-package=app.ui
          --include-package=app.ui.widgets
          --output-dir=dist
          --output-filename=UtilitariosPC.exe
          --company-name="Projeto Utilitarios"
          --product-name="Utilitarios PC"
          --file-version=${{ steps.ver.outputs.version_full }}
          --product-version=${{ steps.ver.outputs.version_full }}
          --file-description="Suite de utilitarios para organizacao de arquivos e produtividade no Windows"
          --copyright="Copyright (C) 2026 Projeto Utilitarios"
          --trademarks="Utilitarios PC"
          --lto=yes
          --assume-yes-for-downloads
          app/main.py

      - name: Download VC++ Redistributable
        shell: pwsh
        run: |
          Invoke-WebRequest `
            -Uri "https://aka.ms/vs/17/release/vc_redist.x64.exe" `
            -OutFile "dist/vc_redist.x64.exe"

      - name: Compile Inno Setup installer
        shell: cmd
        run: |
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion=${{ steps.ver.outputs.version }} installer.iss

      - name: Generate SHA256 (Windows)
        shell: pwsh
        run: |
          $setup = Get-ChildItem installer\UtilitariosPC_Setup_*.exe | Select-Object -First 1
          $hash = (Get-FileHash $setup.FullName -Algorithm SHA256).Hash
          "$hash  $($setup.Name)" | Out-File -Encoding ascii installer\SHA256SUMS-windows.txt
          Get-Content installer\SHA256SUMS-windows.txt

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: UtilitariosPC-Windows
          path: |
            installer/UtilitariosPC_Setup_*.exe
            installer/SHA256SUMS-windows.txt
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements-dev.txt

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf ccache libgl1 libegl1 libxcb-cursor0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install nuitka ordered-set zstandard

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

      # Linux também usa standalone: inicialização mais rápida (sem unpack em /tmp)
      # e binário mais fácil de inspecionar que --onefile.
      - name: Build with Nuitka (standalone)
        run: >
          python -m nuitka
          --standalone
          --enable-plugin=pyqt6
          --include-data-dir=app/assets=app/assets
          --include-data-files=app/icone.ico=app/icone.ico
          --include-package=app
          --include-package=app.core
          --include-package=app.ui
          --include-package=app.ui.widgets
          --output-dir=dist
          --output-filename=UtilitariosPC
          --lto=yes
          --assume-yes-for-downloads
          app/main.py

      - name: Package tarball with .desktop
        run: |
          set -e
          VERSION="${GITHUB_REF_NAME}"
          DIST_NAME="UtilitariosPC-Linux-${VERSION}"
          cd dist
          # Copiar ícone para dentro do bundle
          cp ../app/icone.ico main.dist/
          # Gerar .desktop portável (Exec relativo)
          cat > main.dist/utilitarios-pc.desktop << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=Utilitários PC
          Comment=Suite de utilitários para organização de arquivos e produtividade
          Exec=./UtilitariosPC
          Icon=./icone.ico
          Terminal=false
          Categories=Utility;FileTools;
          StartupNotify=true
          EOF
          chmod +x main.dist/UtilitariosPC
          mv main.dist "${DIST_NAME}"
          tar czf "${DIST_NAME}.tar.gz" "${DIST_NAME}"
          sha256sum "${DIST_NAME}.tar.gz" > SHA256SUMS-linux.txt
          cat SHA256SUMS-linux.txt

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: UtilitariosPC-Linux
          path: |
            dist/UtilitariosPC-Linux-*.tar.gz
            dist/SHA256SUMS-linux.txt
          if-no-files-found: error

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Combine SHA256SUMS
        run: |
          cat artifacts/UtilitariosPC-Windows/SHA256SUMS-windows.txt \
              artifacts/UtilitariosPC-Linux/SHA256SUMS-linux.txt \
              > artifacts/SHA256SUMS.txt
          echo "=== SHA256SUMS.txt ==="
          cat artifacts/SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Utilitários PC ${{ github.ref_name }}"
          body: |
            ## Utilitários PC ${{ github.ref_name }}

            Suite de utilitários multi-plataforma para organização de arquivos e produtividade.

            ### Downloads
            - **Windows**: `UtilitariosPC_Setup_*.exe` — instalador completo (inclui VC++ Redist quando necessário, cria atalhos, autostart opcional).
            - **Linux**: `UtilitariosPC-Linux-${{ github.ref_name }}.tar.gz` — extrair e executar `./UtilitariosPC`.

            ### Integridade (SHA-256)
            Os hashes estão em `SHA256SUMS.txt`. Verifique antes de instalar:
            ```bash
            # Linux / macOS
            sha256sum -c SHA256SUMS.txt

            # Windows (PowerShell)
            Get-FileHash UtilitariosPC_Setup_*.exe -Algorithm SHA256
            ```

            ### ⚠️ Aviso sobre Windows Defender / SmartScreen
            Esta build **não é assinada digitalmente** ainda. O Windows pode exibir avisos de "editor desconhecido" ou marcar o instalador como suspeito (falso-positivo).

            - **SmartScreen:** clique em *Mais informações → Executar assim mesmo*.
            - **Defender marcou como malware:** reporte como falso-positivo em <https://www.microsoft.com/wdsi/filesubmission>. Normalmente é liberado em 24–48 h.

            ### Requisitos
            - Windows 10/11 (64-bit) ou Linux (Ubuntu 20.04+, Fedora 36+).
            - Ubuntu/Debian: `sudo apt install libxcb-cursor0`.
          files: |
            artifacts/UtilitariosPC-Windows/UtilitariosPC_Setup_*.exe
            artifacts/UtilitariosPC-Linux/UtilitariosPC-Linux-*.tar.gz
            artifacts/SHA256SUMS.txt
          draft: false
          prerelease: false
